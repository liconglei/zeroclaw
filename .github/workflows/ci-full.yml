name: CI Full Matrix

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: ubuntu-latest
          #   target: aarch64-unknown-linux-gnu
          #   cross_compiler: gcc-aarch64-linux-gnu
          #   linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER
          #   linker: aarch64-linux-gnu-gcc
          # - os: macos-15-intel
          #   target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.92.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        if: runner.os != 'Windows'

      - name: Install cross compiler
        if: matrix.cross_compiler
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.cross_compiler }}

      - name: Build release
        shell: bash
        run: |
          if [ -n "${{ matrix.linker_env || '' }}" ] && [ -n "${{ matrix.linker || '' }}" ]; then
            export "${{ matrix.linker_env }}=${{ matrix.linker }}"
          fi
          cargo build --release --locked --target ${{ matrix.target }}

      - name: Prepare Artifact
        shell: bash
        run: |
          # 1. 创建存放文件的目录
          mkdir -p upload_dir
          
          # 2. 找到编译好的二进制文件路径
          # Windows 下后缀是 .exe，其他平台没有后缀
          if [ "${{ runner.os }}" == "Windows" ]; then
            BIN_PATH="target/${{ matrix.target }}/release/zeroclaw.exe"
            OUT_NAME="zeroclaw-${{ matrix.target }}.exe"
          else
            BIN_PATH="target/${{ matrix.target }}/release/zeroclaw"
            OUT_NAME="zeroclaw-${{ matrix.target }}"
          fi
          
          # 3. 复制并重命名为带平台标识的名字，防止不同任务间文件名冲突
          cp "$BIN_PATH" "upload_dir/$OUT_NAME"
          
          # 4. (可选) 如果是 Linux/Mac，赋予执行权限并打包成 zip (GitHub 推荐上传 zip)
          if [ "${{ runner.os }}" != "Windows" ]; then
            chmod +x "upload_dir/$OUT_NAME"
            cd upload_dir
            zip "../${OUT_NAME}.zip" "$OUT_NAME"
            cd ..
            echo "ARTIFACT_NAME=${OUT_NAME}.zip" >> $GITHUB_ENV
          else
            echo "ARTIFACT_NAME=${OUT_NAME}" >> $GITHUB_ENV
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # 使用动态名称，例如：zeroclaw-x86_64-pc-windows-msvc.exe
          name: ${{ env.ARTIFACT_NAME }}
          path: upload_dir/*
          retention-days: 5 # 保留 5 天，过期自动删除以节省空间
